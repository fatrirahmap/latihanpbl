name: Automisasi Testing Sebelum Merge

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HTMLLint & StyleLint
        run: |
          npm install -g htmlhint stylelint

      - name: Periksa HTML
        run: htmlhint "**/*.html"

      - name: Periksa CSS
        run: stylelint "**/*.css"
